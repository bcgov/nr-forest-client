name: Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/*"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  vars:
    name: Set Variables
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      # Get PR number for squash merges to main
      - name: PR Number
        id: pr
        uses: bcgov/action-get-pr@bfa713a9ab410c0f0c13126c35983934fc80d15b # v0.1.1

  deploy-test:
    name: Deploy (TEST)
    secrets: inherit
    uses: ./.github/workflows/.deploy.yml
    with:
      environment: test
      target: test
      url: forestclient-test.apps.silver.devops.gov.bc.ca
      configmap-backend: |-
        features:
          staff:
            match: true
        info:
          app:
            component: backend
      configmap-frontend: |-
        window.localStorage.setItem(\"VITE_FEATURE_FLAGS\",'{}');

  reporting:
    name: SchemaSpy & ZAP
    needs: [deploy-test]
    permissions:
      contents: write
      pages: write
      issues: write
    uses: ./.github/workflows/reporting.yml

  deploy-prod:
    name: Deploy (PROD)
    needs: [deploy-test]
    secrets: inherit
    uses: ./.github/workflows/.deploy.yml
    with:
      environment: prod
      target: prod
      url: forestclient.nrs.gov.bc.ca
      configmap-backend: |-
        features:
          staff:
            match: false
        info:
          app:
            component: backend
      configmap-frontend: |-
        window.localStorage.setItem(\"VITE_FEATURE_FLAGS\",'{}');

  images-prod:
    name: Promote images to PROD
    needs: [deploy-prod]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component: [backend, frontend, legacy, database, processor]
    steps:
      - uses: shrink/actions-docker-registry-tag@e6aaef25c595b6e0edd18bf4c7dbfea3abd43299 # v5
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.component }}
          target: test
          tags: prod

  release:
    name: Release
    needs: [deploy-prod]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Conventional Changelog Update
        uses: TriPSs/conventional-changelog-action@91be4f3188da74fe85de9caffcebc80b26d43b5b # v6
        id: changelog
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          output-file: "CHANGELOG.md"
          skip-version-file: "true"
          skip-commit: "true"
          git-push: "true"

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: steps.changelog.outputs.tag != ''
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          token: ${{ github.token }}
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
