name: PR Closed

on:
  pull_request:
    types: [closed]

concurrency:
  # PR open and close use the same group, allowing only one at a time
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  cleanup:
    name: Cleanup and Images
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-close.yml@18a043020cdc4f1125ec592524e8163edc767f4a # v1.2.0
    permissions:
      packages: write
    secrets:
      oc_namespace: ${{ secrets.OC_NAMESPACE }}
      oc_token: ${{ secrets.OC_TOKEN }}
    with:
      cleanup: label
      packages: backend database frontend legacy processor

  remove-tools:
    name: Remove database and user
    secrets: inherit
    uses: ./.github/workflows/.tools-cleanup.yml

  promote-tools:
    name: Promote tools
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - uses: shrink/actions-docker-registry-tag@e6aaef25c595b6e0edd18bf4c7dbfea3abd43299 # v5
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/legacydb
          target: ${{ github.event.number }}
          tags: latest
